replicaCount: 1

image:
  repository: 899631475351.dkr.ecr.us-east-2.amazonaws.com/hello-world-flask
  tag: "v1"
  pullPolicy: IfNotPresent

imagePullSecrets: []  # Not needed if nodes have ECR IAM permissions

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false

podAnnotations: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

# Horizontal Pod Autoscaler (CPU & Memory at 50%)
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 50
  targetMemoryUtilizationPercentage: 50

ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
  tls: []