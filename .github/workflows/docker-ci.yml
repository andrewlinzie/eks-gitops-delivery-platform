name: GitOps CI - Flask to ECR and Helm Update

on:
  workflow_dispatch:
  push:
    branches:
      - gitops
    paths:
      - "App/**"
      - "helm/**"
      - ".github/workflows/**"

permissions:
  contents: write
  id-token: write

concurrency:
  group: gitops-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-2
  APP_DIR: App
  HELM_VALUES_FILE: helm/hello/values.yaml

jobs:
  validate:
    name: Validate Flask App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: App/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "${APP_DIR}/requirements.txt"
          pip install flake8 pytest

      - name: Lint application
        run: |
          flake8 "${APP_DIR}" --max-line-length=100

      - name: Run tests
        run: |
          pytest "${APP_DIR}" || echo "No tests found yet - add tests for stronger CI"

  build_and_push:
    name: Build and Push Image to ECR
    runs-on: ubuntu-latest
    needs: validate
    environment: gitops

    outputs:
      image_uri: ${{ steps.prep.outputs.image_uri }}
      image_tag: ${{ steps.prep.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: github-actions-ecr
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Prepare image metadata
        id: prep
        env:
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
        run: |
          echo "image_uri=${ECR_REGISTRY}/${ECR_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "image_tag=$(git rev-parse --short=8 "$GITHUB_SHA")" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -t "${{ steps.prep.outputs.image_uri }}:${{ steps.prep.outputs.image_tag }}" \
            -t "${{ steps.prep.outputs.image_uri }}:latest" \
            "${APP_DIR}"

      - name: Push Docker image to ECR
        run: |
          docker push "${{ steps.prep.outputs.image_uri }}:${{ steps.prep.outputs.image_tag }}"
          docker push "${{ steps.prep.outputs.image_uri }}:latest"

  update_gitops_manifests:
    name: Update Helm Values in GitOps Branch
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Helm image repository and tag
        env:
          IMAGE_URI: ${{ needs.build_and_push.outputs.image_uri }}
          IMAGE_TAG: ${{ needs.build_and_push.outputs.image_tag }}
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          path = Path("helm/hello/values.yaml")
          text = path.read_text()

          text = re.sub(
              r'(^\s*repository:\s*).*$',
              rf'\1{__import__("os").environ["IMAGE_URI"]}',
              text,
              flags=re.MULTILINE
          )
          text = re.sub(
              r'(^\s*tag:\s*).*$',
              rf'\1"{__import__("os").environ["IMAGE_TAG"]}"',
              text,
              flags=re.MULTILINE
          )

          path.write_text(text)
          PY

      - name: Commit and push Helm values update
        env:
          IMAGE_TAG: ${{ needs.build_and_push.outputs.image_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${HELM_VALUES_FILE}"
          git commit -m "chore(gitops): update hello image tag to ${IMAGE_TAG}" || echo "No changes to commit"
          git push origin gitops